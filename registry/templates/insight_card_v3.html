<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insight Card - {{ spec.template_version }}</title>
    <link rel="stylesheet" href="base.css">
    <style>
        :root {
            --primary: {{ spec.brand_colors.primary }};
            --accent: {{ spec.brand_colors.accent }};
            --bg-dark: {{ spec.brand_colors.bg_dark }};
            --text-main: {{ spec.brand_colors.text }};
            --white: {{ spec.brand_colors.white }};
            --font-heading: '{{ spec.font_family }}', sans-serif;
        }

        body {
            padding: 0; 
            margin: 0;
            background-color: #000; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            width: {{ spec.dimensions.width }}px;
            height: {{ spec.dimensions.height }}px;
            background-color: var(--bg-dark);
            position: relative;
            box-sizing: border-box;
            padding: 100px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .quote-mark {
            font-size: 140px;
            color: rgba(62, 146, 204, 0.2);
            font-family: var(--font-heading);
            line-height: 1;
            margin-bottom: -40px;
            z-index: 1;
        }

        .insight-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            padding: 60px;
            z-index: 2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 90%;
        }

        .heading-xl {
            margin-bottom: 24px;
            color: var(--white);
        }
    </style>
</head>
<body>

    {% set slide = spec.slides[0] %}
    <div class="slide" id="slide-1">
        
        <div class="slide-header">
            {% if spec.logo_path %}
                <img src="file://{{ spec.logo_path }}" alt="Logo" class="brand-logo">
            {% else %}
                <div class="brand-logo" style="color:white; font-size: 32px; font-weight:bold;">jobingen</div>
            {% endif %}
        </div>

        <div class="quote-mark">"</div>
        <div class="insight-card animate-fade-up">
            <h1 class="heading-xl">{{ slide.heading }}</h1>
            <p class="body-text">{{ slide.body }}</p>
        </div>

        <div class="slide-footer">
            <span class="footer-text">jobingen Insights</span>
            <span class="footer-handle">@jobingen</span>
        </div>
        
    </div>

</body>
</html>
