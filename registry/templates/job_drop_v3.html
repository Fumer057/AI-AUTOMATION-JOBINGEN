<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Drop - {{ spec.template_version }}</title>
    <link rel="stylesheet" href="base.css">
    <style>
        :root {
            --primary: {{ spec.brand_colors.primary }};
            --accent: {{ spec.brand_colors.accent }};
            --bg-dark: {{ spec.brand_colors.bg_dark }};
            --text-main: {{ spec.brand_colors.text }};
            --white: {{ spec.brand_colors.white }};
            --font-heading: '{{ spec.font_family }}', sans-serif;
        }

        body {
            padding: 0; margin: 0;
            background-color: #000;
            display: flex; justify-content: center;
        }

        .slide {
            width: {{ spec.dimensions.width }}px;
            height: {{ spec.dimensions.height }}px;
            background-color: var(--bg-dark);
            position: relative;
            box-sizing: border-box;
            padding: 100px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .job-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 50px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* decorative ribbon */
        .job-card::before {
            content: "HOT ROLE";
            position: absolute;
            top: 24px; right: -40px;
            background: var(--accent);
            color: #fff;
            padding: 8px 48px;
            transform: rotate(45deg);
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .heading-lg { margin-bottom: 16px; color: var(--accent); }
        
        .role-details {
            display: flex;
            gap: 24px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
        }
        
        .detail-item {
            background: rgba(255,255,255,0.05);
            padding: 16px 24px;
            border-radius: var(--radius-sm);
            font-family: var(--font-heading);
            color: var(--white);
            font-weight: 600;
        }
    </style>
</head>
<body>

    {% set slide = spec.slides[0] %}
    <div class="slide" id="slide-1">
        
        <div class="slide-header">
            {% if spec.logo_path %}
                <img src="file://{{ spec.logo_path }}" alt="Logo" class="brand-logo">
            {% else %}
                <div class="brand-logo" style="color:white; font-size: 32px; font-weight:bold;">JobInGen</div>
            {% endif %}
            <div class="slide-number" style="background:var(--primary); color:white;">NEW OPPORTUNITY</div>
        </div>

        <h1 class="heading-xl text-gradient animate-fade-up">Now Hiring</h1>
        
        <div class="job-card animate-fade-up" style="animation-delay: 0.2s;">
            <h2 class="heading-lg">{{ slide.heading }}</h2>
            <p class="body-text">{{ slide.body }}</p>
            
            <div class="role-details">
                <div class="detail-item">📍 Remote / Hybrid</div>
                <div class="detail-item">💼 Full-time</div>
                <div class="detail-item">🚀 High Growth</div>
            </div>
        </div>

        <div class="slide-footer">
            <span class="footer-text">Link in bio to apply</span>
            <span class="footer-handle">@JobInGen</span>
        </div>
        
    </div>

</body>
</html>
