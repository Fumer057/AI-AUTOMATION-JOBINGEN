<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mentor Spotlight - {{ spec.template_version }}</title>
    <link rel="stylesheet" href="base.css">
    <style>
        :root {
            --primary: {{ spec.brand_colors.primary }};
            --accent: {{ spec.brand_colors.accent }};
            --bg-dark: {{ spec.brand_colors.bg_dark }};
            --text-main: {{ spec.brand_colors.text }};
            --white: {{ spec.brand_colors.white }};
            --font-heading: '{{ spec.font_family }}', sans-serif;
        }

        body {
            padding: 0; margin: 0; background-color: #000;
            display: flex; justify-content: center;
        }

        .slide {
            width: {{ spec.dimensions.width }}px;
            height: {{ spec.dimensions.height }}px;
            background-color: var(--bg-dark);
            position: relative; box-sizing: border-box;
            padding: 100px 80px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .qa-container {
            display: flex; flex-direction: column; gap: 40px;
        }

        .question {
            background: rgba(255, 255, 255, 0.05);
            border-left: 6px solid var(--accent);
            padding: 24px 32px;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            font-size: 32px; font-weight: 700; color: var(--white);
            font-family: var(--font-heading);
        }

        .answer {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: var(--radius-lg);
            font-size: 28px; line-height: 1.6; color: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>
    {% set slide = spec.slides[0] %}
    <div class="slide" id="slide-1">
        <div class="slide-header">
            {% if spec.logo_path %}
                <img src="file://{{ spec.logo_path }}" alt="Logo" class="brand-logo">
            {% endif %}
            <div class="slide-number">MENTOR Q&A</div>
        </div>

        <div class="qa-container animate-fade-up">
            <div class="question">Q: {{ slide.heading }}</div>
            <div class="answer">{{ slide.body }}</div>
        </div>

        <div class="slide-footer">
            <span class="footer-text">Career Advice</span>
            <span class="footer-handle">@JobInGen</span>
        </div>
    </div>
</body>
</html>
