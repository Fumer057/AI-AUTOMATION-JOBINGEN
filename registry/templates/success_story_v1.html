<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success Story - {{ spec.template_version }}</title>
    <link rel="stylesheet" href="base.css">
    <style>
        :root {
            --primary: {{ spec.brand_colors.primary }};
            --accent: {{ spec.brand_colors.accent }};
            --bg-dark: {{ spec.brand_colors.bg_dark }};
            --text-main: {{ spec.brand_colors.text }};
            --white: {{ spec.brand_colors.white }};
            --font-heading: '{{ spec.font_family }}', sans-serif;
        }

        body {
            padding: 0; margin: 0; background-color: #000;
            display: flex; justify-content: center;
        }

        .slide {
            width: {{ spec.dimensions.width }}px;
            height: {{ spec.dimensions.height }}px;
            background-color: var(--bg-dark);
            position: relative; box-sizing: border-box;
            padding: 100px 80px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .testimonial-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 60px;
            position: relative;
        }

        .avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            position: absolute;
            top: -60px; left: 60px;
            border: 8px solid var(--bg-dark);
        }

        .quote {
            font-size: 36px; line-height: 1.4; color: var(--white);
            margin-top: 40px; margin-bottom: 24px;
            font-family: var(--font-heading);
            font-style: italic;
        }

        .author-info {
            display: flex; flex-direction: column; gap: 8px;
            border-top: 1px solid var(--glass-border);
            padding-top: 24px;
        }

        .author-name { font-size: 24px; font-weight: 700; color: var(--accent); }
        .author-role { font-size: 20px; color: rgba(240,240,240,0.7); }
    </style>
</head>
<body>
    {% set slide = spec.slides[0] %}
    <div class="slide" id="slide-1">
        <div class="slide-header">
            {% if spec.logo_path %}
                <img src="file://{{ spec.logo_path }}" alt="Logo" class="brand-logo">
            {% endif %}
            <div class="slide-number">STUDENT SUCCESS</div>
        </div>

        <div class="testimonial-card animate-fade-up">
            <div class="avatar"></div>
            <div class="quote">"{{ slide.heading }}"</div>
            <div class="author-info">
                <div class="author-name">JobInGen Alumni</div>
                <div class="author-role">{{ slide.body }}</div>
            </div>
        </div>

        <div class="slide-footer">
            <span class="footer-text">Read the full story</span>
            <span class="footer-handle">@JobInGen</span>
        </div>
    </div>
</body>
</html>
